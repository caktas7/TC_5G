<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gNodeB Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    /* Floating panel */
    #panel{
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;

      width: 380px;
      max-width: calc(100vw - 20px);
      max-height: calc(100vh - 20px);
      overflow: auto;

      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.16);

      padding: 10px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 12px;
    }

    .row { display:flex; gap:8px; align-items:center; margin: 6px 0; flex-wrap: wrap; }
    .btn {
      border: 1px solid rgba(0,0,0,0.18);
      background: #fff;
      border-radius: 10px;
      padding: 6px 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }
    .btn:active { transform: translateY(1px); }

    .searchBlock { width: 100%; }
    .label { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }

    input[type="text"]{
      width: 100%;
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      font-size: 12px;
      box-sizing: border-box;
    }

    .suggest {
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.95);
      overflow: hidden;
      margin-top: 4px;
      display: none;
      max-height: 180px;
      overflow-y: auto;
    }
    .suggestItem{
      padding: 7px 9px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      font-size: 12px;
    }
    .suggestItem:hover{ background: rgba(0,0,0,0.05); }
    .suggestItem:last-child{ border-bottom: none; }
    .muted { opacity: 0.75; font-size: 11px; }

    .crumbs { display:flex; gap:6px; flex-wrap: wrap; align-items:center; margin-top: 6px; }
    .crumb {
      border:1px solid rgba(0,0,0,0.15);
      border-radius:999px;
      padding:3px 8px;
      background:#fff;
      cursor:pointer;
      user-select:none;
      font-size:11px;
    }
    .crumb.disabled { opacity: 0.55; cursor: default; }

    .kv { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; white-space: pre-wrap; margin-top:6px; }

    /* Labels (plain) */
.sector-label{
  background: transparent;   /* ✅ no white pill */
  border: none;              /* ✅ no outline */
  border-radius: 0;
  padding: 0;
  box-shadow: none;

  white-space: nowrap;
  font: 800 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  color:#111;

  /* keep readability on satellite/street */
  text-shadow:
    -1px -1px 0 #fff,
     1px -1px 0 #fff,
    -1px  1px 0 #fff,
     1px  1px 0 #fff;
}

    /* Bubble label wrap (fix cut text) */
    .bubbleWrap{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      width: 100%; height: 100%;
      color:#fff;
      text-align:center;
      padding: 4px;
      box-sizing: border-box;
    }
    .bubbleCount{ font-weight: 900; line-height: 1; }
    .bubbleName{
      font-size: 10px;
      opacity: 0.95;
      line-height: 1.1;
      display: -webkit-box;
      -webkit-line-clamp: 2; /* 2 lines */
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    /* Panel site list */
    .sectionTitle{
      font-weight: 800;
      margin-top: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .siteList{
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.95);
      overflow: hidden;
      max-height: 260px;
      overflow-y: auto;
    }
    .siteRow{
      padding: 7px 9px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      font-size: 12px;
    }
    .siteRow:hover{ background: rgba(0,0,0,0.05); }
    .siteRow:last-child{ border-bottom: none; }

    /* Map site-name marker (vibrant) */
  .siteNameWrap{
  display:flex;
  align-items:center;
  gap:6px;

  background: transparent;     /* ✅ no white pill */
  border: none;                /* ✅ no outline */
  border-radius: 0;
  padding: 0;
  box-shadow: none;

  white-space: nowrap;
  font: 800 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  color:#111;

  /* keep readability without a box */
  text-shadow:
    -1px -1px 0 #fff,
     1px -1px 0 #fff,
    -1px  1px 0 #fff,
     1px  1px 0 #fff;
}
    
    .dot{
      width:12px;height:12px;border-radius:50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
      flex: 0 0 auto;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="panel">
    <div class="row">
      <label><input id="show3500" type="checkbox" checked> 3500</label>
      <label><input id="show700" type="checkbox" checked> 700</label>
    </div>

    <div class="searchBlock">
      <div class="label">Search Site</div>
      <input id="siteSearch" type="text" placeholder="Type SITE ID…" autocomplete="off" />
      <div id="siteSuggest" class="suggest"></div>
    </div>

    <div class="searchBlock" style="margin-top:8px;">
      <div class="label">Search Cluster</div>
      <input id="clusterSearch" type="text" placeholder="Type CLUSTER…" autocomplete="off" />
      <div id="clusterSuggest" class="suggest"></div>
    </div>

    <div class="crumbs" id="crumbs"></div>

    <div id="siteListBlock" style="display:none;">
      <div class="sectionTitle" id="siteListTitle">Sites</div>
      <div class="siteList" id="siteList"></div>
    </div>

    <div id="stats" class="kv">Ready.</div>
  </div>

  <!-- Must be in same folder -->
  <script src="./data.js"></script>

  <script>
    // ===== Fixed settings =====
    const CLICK_SITE_ZOOM_MIN = 15;
    const SECTOR_RANGE_M = 500;
    const SECTOR_WIDTH_DEG = 45;
    const SECTOR_LABEL_FRACTION = 0.82;
    const BUBBLE_BOUNDS_PAD = 0.20;
    const SSV_COLOR = "#6b6b6b";

    // "Vibrant" look for site labels when cluster selected
    const CLUSTER_SITE_COLOR = "#00b7ff";  // bright cyan-blue
    const OTHER_SITE_COLOR   = "rgba(90,90,90,0.55)";

    const map = L.map('map', { preferCanvas: true }).setView([39.0, 35.0], 6);

    const street = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 20,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const satellite = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      { maxZoom: 20, attribution: "Tiles &copy; Esri" }
    );

    const bubbleLayer = L.layerGroup().addTo(map);
    const siteLayer   = L.layerGroup().addTo(map);
    const sectorLayer = L.layerGroup().addTo(map);

    const COLS = {
      main: "MAIN REGION",
      sub: "SUB REGION",
      cluster: "CLUSTER",
      site: "SITE ID",
      lat: "LAT",
      lon: "LON",
      band: "BAND",
      sector: "SECTOR",
      pci: "PCI",
      az: "AZIMUTH",
    };

    const bandColors = { "NR3500": "#1f77b4", "NR700": "#ff7f0e", "_DEFAULT": "#2ca02c" };

    const PALETTE = [
      "#e41a1c","#377eb8","#4daf4a","#984ea3","#ff7f00","#a65628","#f781bf","#999999",
      "#66c2a5","#fc8d62","#8da0cb","#e78ac3","#a6d854","#ffd92f","#e5c494","#b3b3b3",
      "#1b9e77","#d95f02","#7570b3","#e7298a","#66a61e","#e6ab02","#a6761d","#666666",
      "#8dd3c7","#ffffb3","#bebada","#fb8072","#80b1d3","#fdb462","#b3de69","#fccde5"
    ];

    function makeColorAssigner() {
      const m = new Map();
      return {
        get: (key) => {
          if (!m.has(key)) m.set(key, PALETTE[m.size % PALETTE.length]);
          return m.get(key);
        },
        clear: () => m.clear()
      };
    }

    const mainColors = makeColorAssigner();
    const subColors  = makeColorAssigner();
    const cluColors  = makeColorAssigner();

    function setStats(msg) { document.getElementById("stats").textContent = msg; }
    function normStr(x) { return String(x ?? "").trim(); }
    function normBand(x) { return normStr(x).toUpperCase(); }

    // data.js provides window.GNODEB_DATA = { rows: [...] }
    if (!window.GNODEB_DATA || !Array.isArray(window.GNODEB_DATA.rows)) {
      setStats("ERROR: data.js not loaded or invalid.");
      throw new Error("GNODEB_DATA missing");
    }

    // Indexes
    let sitesIndex = new Map();      // siteKey -> site object
    let sectorsBySite = new Map();   // siteKey -> rows

    let siteIdToKey = new Map();     // exact site id -> siteKey
    let clusterKeyToSites = new Map(); // exact cluster lower -> array of siteKeys
    let clusterKeyToOneSite = new Map(); // for preserving original casing
    let allSiteIds = [];            // for suggestions
    let allClusters = [];           // for suggestions

    let drill = { level: "main", main: null, sub: null, cluster: null };
    let lastSelectedSiteKey = null;

    function siteKey(site, lat, lon) {
      return `${site}__${lat.toFixed(6)}__${lon.toFixed(6)}`;
    }

    function shouldShowBand(band) {
      const b = normBand(band);
      const s3500 = document.getElementById("show3500").checked;
      const s700 = document.getElementById("show700").checked;
      if (b === "NR3500") return s3500;
      if (b === "NR700") return s700;
      return true;
    }

    // Geometry
    function destPoint(lat, lon, bearingDeg, distanceM) {
      const R = 6371000;
      const brng = bearingDeg * Math.PI / 180;
      const φ1 = lat * Math.PI / 180;
      const λ1 = lon * Math.PI / 180;
      const δ = distanceM / R;
      const φ2 = Math.asin(Math.sin(φ1) * Math.cos(δ) + Math.cos(φ1) * Math.sin(δ) * Math.cos(brng));
      const λ2 = λ1 + Math.atan2(
        Math.sin(brng) * Math.sin(δ) * Math.cos(φ1),
        Math.cos(δ) - Math.sin(φ1) * Math.sin(φ2)
      );
      return [φ2 * 180 / Math.PI, λ2 * 180 / Math.PI];
    }

    function makeFanLatLngs(lat, lon, azimuth, widthDeg, radiusM, steps=14) {
      const left = azimuth - widthDeg / 2;
      const right = azimuth + widthDeg / 2;
      const pts = [];
      pts.push([lat, lon]);
      for (let i = 0; i <= steps; i++) {
        const b = left + (right - left) * (i / steps);
        pts.push(destPoint(lat, lon, b, radiusM));
      }
      return pts;
    }

    function addLabelAt(latlng, html, className) {
      const icon = L.divIcon({
        className: "",
        html: `<div class="${className}">${html}</div>`,
        iconSize: [1, 1],
        iconAnchor: [0, 0]
      });
      return L.marker(latlng, { icon, interactive: false });
    }

    function addConeAndLabel(layer, siteObj, row) {
      const band = normBand(row[COLS.band]) || "UNKNOWN";
      const baseColor = bandColors[band] || bandColors["_DEFAULT"];
      const az = Number(row[COLS.az]);

      const pts = makeFanLatLngs(siteObj.lat, siteObj.lon, az, SECTOR_WIDTH_DEG, SECTOR_RANGE_M, 14);
      L.polygon(pts, {
        color: baseColor,
        weight: 2,
        opacity: 0.85,
        fillColor: baseColor,
        fillOpacity: 0.12,
        interactive: false
      }).addTo(layer);

      const pci = row[COLS.pci];
      const pciText = (pci == null || pci === "" || Number.isNaN(Number(pci))) ? "PCI ?" : `PCI ${Number(pci)}`;
      const sector = row[COLS.sector];
      const labelText = `S${sector} | ${pciText} | ${az}°`;

      const labelPos = destPoint(siteObj.lat, siteObj.lon, az, SECTOR_RANGE_M * SECTOR_LABEL_FRACTION);
      addLabelAt(labelPos, labelText, "sector-label").addTo(layer);
    }

    // Bubble icon (2 line name)
    function bubbleIcon(color, count, label) {
      const size = count < 100 ? 54 : count < 500 ? 64 : 72;
      const safeLabel = (label ?? "").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const html = `
        <div style="
          width:${size}px;height:${size}px;border-radius:50%;
          background:${color};
          border:2px solid #fff;
          box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
        ">
          <div class="bubbleWrap">
            <div class="bubbleCount">${count}</div>
            <div class="bubbleName">${safeLabel}</div>
          </div>
        </div>`;
      return L.divIcon({ html, className: "", iconSize: [size, size], iconAnchor: [size/2, size/2] });
    }

    // Site “vibrant name on map”
    function siteNameIcon(dotColor, name) {
      const safe = String(name ?? "").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const html = `
        <div class="siteNameWrap">
          <div class="dot" style="background:${dotColor};"></div>
          <div>${safe}</div>
        </div>`;
      return L.divIcon({ html, className: "", iconSize: [1,1], iconAnchor: [0, 10] });
    }

    // Panel site list
    function showSiteList(title, siteKeys) {
      const block = document.getElementById("siteListBlock");
      const list = document.getElementById("siteList");
      const t = document.getElementById("siteListTitle");
      t.textContent = title;

      list.innerHTML = "";
      const sorted = siteKeys
        .map(k => sitesIndex.get(k))
        .filter(Boolean)
        .sort((a,b) => a.site.localeCompare(b.site));

      for (const s of sorted) {
        const div = document.createElement("div");
        div.className = "siteRow";
        div.textContent = s.site;
        div.addEventListener("click", () => {
          onSiteClicked(s.key, CLUSTER_SITE_COLOR);
        });
        list.appendChild(div);
      }
      block.style.display = "block";
    }

    function hideSiteList(){
      document.getElementById("siteListBlock").style.display = "none";
      document.getElementById("siteList").innerHTML = "";
    }

    // Drilldown
    function clearLayers() {
      bubbleLayer.clearLayers();
      siteLayer.clearLayers();
      sectorLayer.clearLayers();
      lastSelectedSiteKey = null;
    }

    function centroidForKeys(keys) {
      let sumLat = 0, sumLon = 0, n = 0;
      let minLat =  90, maxLat = -90, minLon =  180, maxLon = -180;
      for (const k of keys) {
        const s = sitesIndex.get(k);
        if (!s) continue;
        sumLat += s.lat; sumLon += s.lon; n++;
        minLat = Math.min(minLat, s.lat); maxLat = Math.max(maxLat, s.lat);
        minLon = Math.min(minLon, s.lon); maxLon = Math.max(maxLon, s.lon);
      }
      if (!n) return null;
      return { center: [sumLat/n, sumLon/n], bounds: L.latLngBounds([[minLat,minLon],[maxLat,maxLon]]) };
    }

    function setDrill(level, main=null, sub=null, cluster=null) {
      drill = { level, main, sub, cluster };
      renderBreadcrumbs();
      renderCurrentLevel();
    }

    function renderBreadcrumbs() {
      const el = document.getElementById("crumbs");
      el.innerHTML = "";

      function addCrumb(text, enabled, onClick) {
        const d = document.createElement("div");
        d.className = "crumb" + (enabled ? "" : " disabled");
        d.textContent = text;
        if (enabled) d.addEventListener("click", onClick);
        el.appendChild(d);
      }

      addCrumb("MAIN", drill.level !== "main", () => setDrill("main"));
      if (drill.main) addCrumb(`MAIN: ${drill.main}`, drill.level !== "sub", () => setDrill("sub", drill.main));
      if (drill.sub) addCrumb(`SUB: ${drill.sub}`, drill.level !== "cluster", () => setDrill("cluster", drill.main, drill.sub));
      if (drill.cluster && drill.level === "sites") addCrumb(`CLUSTER: ${drill.cluster}`, false, () => {});
    }

    function renderCurrentLevel() {
      sectorLayer.clearLayers();
      lastSelectedSiteKey = null;
      bubbleLayer.clearLayers();
      siteLayer.clearLayers();
      hideSiteList();

      if (drill.level === "main") renderMainBubbles();
      else if (drill.level === "sub") renderSubBubbles();
      else if (drill.level === "cluster") renderClusterBubblesAndSSV();
      else renderSitesInCluster();
    }

    function renderMainBubbles() {
      const groups = new Map();
      for (const [key, s] of sitesIndex.entries()) {
        const k = s.main || "UNKNOWN";
        if (!groups.has(k)) groups.set(k, []);
        groups.get(k).push(key);
      }
      for (const [main, keys] of groups.entries()) {
        const geo = centroidForKeys(keys);
        if (!geo) continue;
        const c = mainColors.get(main);
        const m = L.marker(geo.center, { icon: bubbleIcon(c, keys.length, main) });
        m.on("click", () => {
          map.fitBounds(geo.bounds.pad(BUBBLE_BOUNDS_PAD));
          setDrill("sub", main);
          setStats(`MAIN: ${main}`);
        });
        bubbleLayer.addLayer(m);
      }
      setStats("Select MAIN region.");
    }

    function renderSubBubbles() {
      const groups = new Map();
      for (const [key, s] of sitesIndex.entries()) {
        if (s.main !== drill.main) continue;
        const k = s.sub || "UNKNOWN";
        if (!groups.has(k)) groups.set(k, []);
        groups.get(k).push(key);
      }
      for (const [sub, keys] of groups.entries()) {
        const geo = centroidForKeys(keys);
        if (!geo) continue;
        const c = subColors.get(`${drill.main}|${sub}`);
        const m = L.marker(geo.center, { icon: bubbleIcon(c, keys.length, sub) });
        m.on("click", () => {
          map.fitBounds(geo.bounds.pad(BUBBLE_BOUNDS_PAD));
          setDrill("cluster", drill.main, sub);
          setStats(`MAIN: ${drill.main}\nSUB: ${sub}`);
        });
        bubbleLayer.addLayer(m);
      }
      setStats(`MAIN: ${drill.main}\nSelect SUB region.`);
    }

    function renderClusterBubblesAndSSV() {
      const groups = new Map();
      const ssvKeys = [];
      for (const [key, s] of sitesIndex.entries()) {
        if (s.main !== drill.main || s.sub !== drill.sub) continue;
        const cl = s.cluster || "SSV";
        if (cl === "SSV") ssvKeys.push(key);
        else {
          if (!groups.has(cl)) groups.set(cl, []);
          groups.get(cl).push(key);
        }
      }

      // Cluster bubbles
      for (const [cluster, keys] of groups.entries()) {
        const geo = centroidForKeys(keys);
        if (!geo) continue;
        const c = cluColors.get(`${drill.main}|${drill.sub}|${cluster}`);
        const m = L.marker(geo.center, { icon: bubbleIcon(c, keys.length, cluster) });
        m.on("click", () => {
          map.fitBounds(geo.bounds.pad(BUBBLE_BOUNDS_PAD));
          setDrill("sites", drill.main, drill.sub, cluster);

          // show BOTH: list + names on map
          showSiteList(`Cluster: ${cluster}`, keys);
          showSiteNamesOnMap(keys, CLUSTER_SITE_COLOR);

          setStats(`MAIN: ${drill.main}\nSUB: ${drill.sub}\nCLUSTER: ${cluster}`);
        });
        bubbleLayer.addLayer(m);
      }

      // ✅ SSV: show site names on the MAP when you are in SUB->CLUSTER screen
      // (this is what you requested: “see all site names when i click sub regions if they are ssv”)
      for (const key of ssvKeys) {
        const s = sitesIndex.get(key);
        if (!s) continue;
        const marker = L.marker([s.lat, s.lon], { icon: siteNameIcon(SSV_COLOR, s.site) });
        marker.on("click", () => onSiteClicked(key, SSV_COLOR));
        siteLayer.addLayer(marker);
      }

      setStats(`MAIN: ${drill.main}\nSUB: ${drill.sub}\nSelect CLUSTER (SSV names shown).`);
    }

    // On cluster click we show site names on map + also keep them clickable
    function showSiteNamesOnMap(siteKeys, color) {
      siteLayer.clearLayers();
      for (const k of siteKeys) {
        const s = sitesIndex.get(k);
        if (!s) continue;
        const marker = L.marker([s.lat, s.lon], { icon: siteNameIcon(color, s.site) });
        marker.on("click", () => onSiteClicked(k, color));
        siteLayer.addLayer(marker);
      }
    }

    function renderSitesInCluster() {
      // Show site names on the map for all sites in this cluster + panel list
      const keys = [];
      for (const [key, s] of sitesIndex.entries()) {
        if (s.main === drill.main && s.sub === drill.sub && s.cluster === drill.cluster) keys.push(key);
      }

      const geo = centroidForKeys(keys);
      if (geo) map.fitBounds(geo.bounds.pad(BUBBLE_BOUNDS_PAD));

      showSiteList(`Cluster: ${drill.cluster}`, keys);
      showSiteNamesOnMap(keys, CLUSTER_SITE_COLOR);

      setStats(`MAIN: ${drill.main}\nSUB: ${drill.sub}\nCLUSTER: ${drill.cluster}`);
    }

    function onSiteClicked(siteKeyVal, markerColor) {
      const siteObj = sitesIndex.get(siteKeyVal);
      if (!siteObj) return;

      const targetZoom = Math.max(map.getZoom(), CLICK_SITE_ZOOM_MIN);
      map.setView([siteObj.lat, siteObj.lon], targetZoom, { animate: true });

      sectorLayer.clearLayers();
      lastSelectedSiteKey = siteKeyVal;

      // cones + labels
      const rows = sectorsBySite.get(siteKeyVal) || [];
      let drawn = 0;
      for (const r of rows) {
        if (!shouldShowBand(r[COLS.band])) continue;
        addConeAndLabel(sectorLayer, siteObj, r);
        drawn++;
      }

      // no row counting; just show selection
      setStats(`SITE: ${siteObj.site}\nMAIN: ${siteObj.main}\nSUB: ${siteObj.sub}\nCLUSTER: ${siteObj.cluster}\nSectors shown: ${drawn}`);
    }

    function redrawSelectedSite() {
      if (!lastSelectedSiteKey) return;
      onSiteClicked(lastSelectedSiteKey, CLUSTER_SITE_COLOR);
    }

    // Suggestions UI
    function renderSuggest(boxEl, items, onPick) {
      if (!items.length) { boxEl.style.display = "none"; boxEl.innerHTML = ""; return; }
      boxEl.innerHTML = "";
      for (const it of items) {
        const div = document.createElement("div");
        div.className = "suggestItem";
        div.innerHTML = `${it.label}<div class="muted">${it.meta || ""}</div>`;
        div.addEventListener("click", () => onPick(it));
        boxEl.appendChild(div);
      }
      boxEl.style.display = "block";
    }

    function filterTop(list, q, limit=30) {
      const qq = q.toLowerCase();
      const starts = [];
      const contains = [];
      for (const s of list) {
        const v = s.toLowerCase();
        if (v.startsWith(qq)) starts.push(s);
        else if (v.includes(qq)) contains.push(s);
        if (starts.length + contains.length >= limit) break;
      }
      return starts.concat(contains).slice(0, limit);
    }

    // Search handlers
    const siteSearch = document.getElementById("siteSearch");
    const siteSuggest = document.getElementById("siteSuggest");
    siteSearch.addEventListener("input", () => {
      const q = siteSearch.value.trim();
      if (q.length < 2) { siteSuggest.style.display="none"; siteSuggest.innerHTML=""; return; }
      const hits = filterTop(allSiteIds, q, 40).map(v => ({ label: v, meta: "SITE ID", value: v }));
      renderSuggest(siteSuggest, hits, (it) => {
        siteSearch.value = it.value;
        siteSuggest.style.display="none";
        goToSite(it.value);
      });
    });
    siteSearch.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { goToSite(siteSearch.value.trim()); siteSuggest.style.display="none"; }
    });

    const clusterSearch = document.getElementById("clusterSearch");
    const clusterSuggest = document.getElementById("clusterSuggest");
    clusterSearch.addEventListener("input", () => {
      const q = clusterSearch.value.trim();
      if (q.length < 2) { clusterSuggest.style.display="none"; clusterSuggest.innerHTML=""; return; }
      const hits = filterTop(allClusters, q, 40).map(v => ({ label: v, meta: "CLUSTER", value: v }));
      renderSuggest(clusterSuggest, hits, (it) => {
        clusterSearch.value = it.value;
        clusterSuggest.style.display="none";
        goToCluster(it.value);
      });
    });
    clusterSearch.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { goToCluster(clusterSearch.value.trim()); clusterSuggest.style.display="none"; }
    });

    function goToSite(siteId) {
      const key = siteIdToKey.get(siteId.toLowerCase());
      if (!key) { setStats(`Site not found: ${siteId}`); return; }
      const s = sitesIndex.get(key);
      if (!s) return;

      if (s.cluster !== "SSV") setDrill("sites", s.main, s.sub, s.cluster);
      else setDrill("cluster", s.main, s.sub);

      // show cluster sites on map if not SSV
      if (s.cluster !== "SSV") {
        const keys = clusterKeyToSites.get(s.cluster.toLowerCase()) || [];
        showSiteList(`Cluster: ${s.cluster}`, keys);
        showSiteNamesOnMap(keys, CLUSTER_SITE_COLOR);
      }
      onSiteClicked(key, CLUSTER_SITE_COLOR);
    }

    function goToCluster(clusterName) {
      const clKey = clusterName.toLowerCase();
      const keys = clusterKeyToSites.get(clKey);
      if (!keys || !keys.length) { setStats(`Cluster not found: ${clusterName}`); return; }

      // Determine main/sub from any site
      const anySite = sitesIndex.get(keys[0]);
      if (!anySite) return;

      setDrill("sites", anySite.main, anySite.sub, anySite.cluster);

      const geo = centroidForKeys(keys);
      if (geo) map.fitBounds(geo.bounds.pad(BUBBLE_BOUNDS_PAD));

      showSiteList(`Cluster: ${anySite.cluster}`, keys);
      showSiteNamesOnMap(keys, CLUSTER_SITE_COLOR);

      setStats(`MAIN: ${anySite.main}\nSUB: ${anySite.sub}\nCLUSTER: ${anySite.cluster}`);
    }

    // Build indexes
    function buildIndexes(rows) {
      mainColors.clear(); subColors.clear(); cluColors.clear();
      sitesIndex = new Map();
      sectorsBySite = new Map();
      siteIdToKey = new Map();
      clusterKeyToSites = new Map();
      clusterKeyToOneSite = new Map();
      clearLayers();

      for (const r of rows) {
        const site = normStr(r[COLS.site]);
        const lat = Number(r[COLS.lat]);
        const lon = Number(r[COLS.lon]);
        const az  = Number(r[COLS.az]);
        if (!site || !Number.isFinite(lat) || !Number.isFinite(lon) || !Number.isFinite(az)) continue;

        let cluster = normStr(r[COLS.cluster]) || "SSV";
        r[COLS.cluster] = cluster;

        const key = siteKey(site, lat, lon);
        if (!sitesIndex.has(key)) {
          const sObj = {
            key,
            site,
            lat,
            lon,
            main: normStr(r[COLS.main]),
            sub: normStr(r[COLS.sub]),
            cluster
          };
          sitesIndex.set(key, sObj);

          siteIdToKey.set(site.toLowerCase(), key);

          const ckey = cluster.toLowerCase();
          if (!clusterKeyToSites.has(ckey)) clusterKeyToSites.set(ckey, []);
          clusterKeyToSites.get(ckey).push(key);
          if (!clusterKeyToOneSite.has(ckey)) clusterKeyToOneSite.set(ckey, key);
        }

        if (!sectorsBySite.has(key)) sectorsBySite.set(key, []);
        sectorsBySite.get(key).push(r);
      }

      // suggestion lists
      allSiteIds = Array.from(new Set(Array.from(sitesIndex.values()).map(s => s.site))).sort();

      // show original casing for clusters (SSV included)
      allClusters = Array.from(clusterKeyToSites.keys()).map(k => {
        const one = sitesIndex.get(clusterKeyToOneSite.get(k));
        return one ? one.cluster : k;
      }).sort((a,b) => a.localeCompare(b));

      // layers control
      L.control.layers(
        { "Street": street, "Satellite": satellite },
        { "Bubbles": bubbleLayer, "Sites": siteLayer, "Sectors": sectorLayer },
        { collapsed: true }
      ).addTo(map);

      setDrill("main");
      setStats("Ready. Select MAIN region or search.");
    }

    // UI toggles
    document.getElementById("show3500").addEventListener("change", redrawSelectedSite);
    document.getElementById("show700").addEventListener("change", redrawSelectedSite);

    // Close suggestion list when clicking map
    map.on("click", () => {
      siteSuggest.style.display="none";
      clusterSuggest.style.display="none";
    });

    buildIndexes(window.GNODEB_DATA.rows);
  </script>
  <script>

  if (entered !== PASSWORD) {
    document.body.innerHTML = `
      <div style="
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family:Arial;
        font-size:18px;">
        Access Denied
      </div>
    `;
    throw new Error("Wrong password");
  }
</script>
